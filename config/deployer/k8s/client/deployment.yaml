apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramtun-client
  namespace: ramtun
  labels:
    app: ramtun-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ramtun-client
  template:
    metadata:
      labels:
        app: ramtun-client
    spec:
      containers:
        - name: client
          image: ghcr.io/mrrevillod/ramtun-client:sha-bfd4907
          ports:
            - containerPort: 80
              name: http
